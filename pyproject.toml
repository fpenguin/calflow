# CalFlow project configuration.
#
# This file is the single source of truth for tooling settings:
#   ruff      — linter + formatter
#   mypy      — static type checker (advisory in v1.1.x; strict in v1.1.27+)
#   pytest    — once we migrate from unittest in v1.1.27
#
# Project metadata (name, version, dependencies) lives elsewhere for now:
#   __version__         → core/version.py
#   runtime deps        → requirements.txt
#   dev / test deps     → requirements-dev.txt

# ─── Ruff ──────────────────────────────────────────────────────
[tool.ruff]
target-version = "py310"
line-length = 100
extend-exclude = [
    ".venv",
    "data",
    "secrets",
    "scripts/__pycache__",
]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "W",   # pycodestyle warnings
    "F",   # pyflakes
    "I",   # isort
    "B",   # flake8-bugbear
    "UP",  # pyupgrade
]
ignore = [
    "E501",  # line-too-long — many docstrings exceed 100 cols on purpose
    "B008",  # function call in default arg — used intentionally for set()
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["E402"]   # tests insert sys.path before imports
"core/parser/*" = ["UP032"]  # f-strings inside regex strings — keep readable

[tool.ruff.format]
quote-style = "double"
indent-style = "space"


# ─── Mypy ──────────────────────────────────────────────────────
# v1.1.29 — strict mode is configured but not yet enforced in CI.
# Local strict run:
#     pip install -r requirements-dev.txt
#     mypy core/ runtime/ infra/ state/ config/ cli/
# Expect ~50–150 findings on first run. Triage them in batches:
#   - Trivial annotation gaps (missing -> None, missing param hints) → fix.
#   - Genuine type holes (Optional handling, Any escapes) → fix.
#   - Third-party stub gaps (googleapiclient, AppKit) → already
#     suppressed via ignore_missing_imports.
# Once the count is zero locally, flip CI to gate on `mypy --strict`.
[tool.mypy]
python_version = "3.10"
ignore_missing_imports = true     # no stubs for googleapiclient, AppKit, etc.

# Strict-mode flags. Toggle individual ones off if a category is too
# noisy on the first run, then re-enable as the codebase tightens.
strict = true
warn_unused_ignores = true
warn_redundant_casts = true
warn_unreachable = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
check_untyped_defs = true
strict_equality = true
strict_optional = true
no_implicit_optional = true

[[tool.mypy.overrides]]
# Tests routinely use Mocks / Anys / setattr — strict mode there is
# busywork without bug-finding value. Skip for now.
module = ["tests.*", "scripts.*"]
ignore_errors = true


# ─── Pytest (planned migration in v1.1.27) ─────────────────────
[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["*Tests", "*Test", "Test*", "*Suite", "*Spec"]
python_functions = ["test_*"]
addopts = [
    "-v",
    "--tb=short",
    "--strict-markers",
]
filterwarnings = [
    "error",                                # fail on warnings — keeps suite honest
    "ignore::DeprecationWarning:google.*",  # google libs warn on import; out of our control
    "ignore::FutureWarning:google.*",       # google libs warn about Python 3.10 EOL
]
